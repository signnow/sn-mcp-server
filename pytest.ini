[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --asyncio-mode=auto
    --ignore=tests/e2e
markers =
    asyncio: marks tests as async
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    e2e: marks tests as LLM-based end-to-end tests (require LLM_API_HOST, LLM_MODEL, LLM_KEY)
